<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Sentiment Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:24px;
box-shadow:0 0 20px rgba(0,255,255,0.15);
}

h1{
text-align:center;
color:#00ffff;
margin-bottom:20px;
}

textarea{
width:100%;
height:130px;
padding:15px;
border:none;
border-radius:16px;
font-size:16px;
resize:none;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#00ffff;
color:#111;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00ffff;
}

.result{
margin-top:20px;
padding:18px;
border-radius:16px;
background:rgba(255,255,255,0.08);
}

.section{
margin-top:30px;
}

ul{
padding-left:20px;
line-height:1.8;
}

canvas{
margin-top:15px;
background:white;
border-radius:14px;
padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>💡 AI Smart Sentiment Analyzer</h1>

<form method="POST">
<textarea name="sentence" placeholder="Enter your sentence here...">{{ sentence }}</textarea>
<button type="submit">Analyze</button>
</form>

{% if result %}
<div class="result">
<h2>{{ emoji }} {{ result }}</h2>
<p>Confidence: {{ confidence }}</p>
</div>
{% endif %}

<div class="section">
<h2>📝 Recent History</h2>
<ul>
{% for item in history %}
<li>{{ item }}</li>
{% endfor %}
</ul>
</div>

<div class="section">
<h2>📊 Dashboard Analytics</h2>
<canvas id="myChart"></canvas>
</div>

</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Positive', 'Negative', 'Neutral'],
datasets: [{
label: 'Sentiment Count',
data: [{{ positive }}, {{ negative }}, {{ neutral }}],
borderWidth: 1
}]
},
options: {
responsive: true,
scales: {
y: {
beginAtZero: true
}
}
}
});
</script>

</body>
</html>
